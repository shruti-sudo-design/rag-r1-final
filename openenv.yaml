name: rag-rl
description: RL environment for evidence selection in retrieval-augmented generation
version: "1.0"

tasks:
  - id: easy
    name: easy
    difficulty: easy
    description: Redundancy-heavy evidence selection with a small budget
    max_steps: 2
    grader:
      metric: total_reward
      target: 0.75
      reward_range: [0.0, 1.0]
      components:
        - answer_quality
        - evidence_precision
        - evidence_recall

  - id: medium
    name: medium
    difficulty: medium
    description: Stale docs, contradictions, and adversarial summaries under moderate budget pressure
    max_steps: 3
    grader:
      metric: total_reward
      target: 0.65
      reward_range: [0.0, 1.0]
      components:
        - answer_quality
        - evidence_precision
        - evidence_recall
        - contradiction_penalty
        - diversity_bonus

  - id: hard
    name: hard
    difficulty: hard
    description: Tight-budget multi-hop evidence composition with partial-support distractors
    max_steps: 4
    grader:
      metric: total_reward
      target: 0.55
      reward_range: [0.0, 1.0]
      components:
        - answer_quality
        - evidence_precision
        - evidence_recall
        - contradiction_penalty
        - diversity_bonus
        - minimality_bonus
        - budget_penalty

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: GET /grader
