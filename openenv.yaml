spec_version: 1
name: rag-rl
description: RL environment for evidence selection in retrieval-augmented generation
version: "1.0"
app: server.app:app

tasks:
  - id: easy
    name: easy
    difficulty: easy
    description: Redundancy-heavy evidence selection with a small budget
    max_steps: 2
    grader: graders.easy:EasyGrader

  - id: medium
    name: medium
    difficulty: medium
    description: Stale docs, contradictions, and adversarial summaries under moderate budget pressure
    max_steps: 3
    grader: graders.medium:MediumGrader

  - id: hard
    name: hard
    difficulty: hard
    description: Tight-budget multi-hop evidence composition with partial-support distractors
    max_steps: 4
    grader: graders.hard:HardGrader

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: GET /grader
  graders: GET /graders
  grader_registry: GET /grader-registry
