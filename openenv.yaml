spec_version: 1
name: rag-rl
description: RL environment for evidence selection in retrieval-augmented generation
version: "1.0"
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: task_easy
    name: easy
    difficulty: easy
    description: Redundancy-heavy evidence selection with a small budget
    max_steps: 2
    has_grader: true
    reward_range: [0.0, 1.0]
  - id: task_medium
    name: medium
    difficulty: medium
    description: Stale docs, contradictions, and adversarial summaries under moderate budget pressure
    max_steps: 3
    has_grader: true
    reward_range: [0.0, 1.0]
  - id: task_hard
    name: hard
    difficulty: hard
    description: Tight-budget multi-hop evidence composition with partial-support distractors and cross-domain medical queries
    max_steps: 4
    has_grader: true
    reward_range: [0.0, 1.0]

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: GET /grader
